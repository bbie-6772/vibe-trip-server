# ═══════════════════════════════════════════════════
# events 블록 — Nginx 네트워크 동작 방식 설정
# ═══════════════════════════════════════════════════
events {
    worker_connections 512;
    # worker 프로세스 하나가 동시에 처리할 수 있는 최대 연결 수
    # 개발용 512면 충분 / 운영은 1024 이상 권장
}


# ═══════════════════════════════════════════════════
# http 블록 — 웹 관련 모든 설정을 감싸는 최상위 블록
# server, upstream 은 반드시 http 안에 있어야 함
# ═══════════════════════════════════════════════════
http {
    sendfile on;
    # 파일 전송 최적화 (정적 파일 서빙 시 성능 향상)

    keepalive_timeout 65;
    # 클라이언트 연결을 65초 동안 유지
    # 매 요청마다 TCP 재연결하지 않아도 됨

    # ─── 로그 설정 ────────────────────────────────
    access_log /var/log/nginx/access.log;
    # 모든 요청 기록 (IP, URL, 상태코드, 응답시간 등)
    # Bind Mount로 호스트 ./data/nginx/logs 에서 확인 가능

    error_log /var/log/nginx/error.log warn;
    # 경고(warn) 이상 오류만 기록
    # 레벨: debug < info < notice < warn < error < crit


    # ─── upstream 블록 ────────────────────────────
    # 요청을 전달할 백엔드 서버 그룹 정의
    # 여기서 정의한 이름(springboot)을 proxy_pass에서 사용
    upstream springboot {
        server app:8080;
        # app = Spring Boot 컨테이너 이름 (docker network에서 자동으로 IP 변환)

        keepalive 32;
        # upstream과의 연결 32개를 재사용 (성능 최적화)
    }


    # ═══════════════════════════════════════════════
    # server 블록 — 하나의 가상 호스트 설정
    # 포트, 도메인별로 여러 개 만들 수 있음
    # ═══════════════════════════════════════════════
    server {
        listen 80;
        # 80번 포트로 오는 요청을 이 server 블록이 처리

        server_name localhost;
        # 처리할 도메인 이름

        # ─── location 블록 ────────────────────────
        # URL 경로별로 요청을 어떻게 처리할지 정의
        # 경로가 겹치면 가장 구체적인 location이 우선 적용됨

        # 모든 요청 → Spring Boot로 전달
        location / {
            proxy_pass http://springboot;
            # upstream에서 정의한 이름으로 전달

            proxy_http_version 1.1;
            # HTTP/1.1 사용 (keepalive 지원을 위해 필수)

            proxy_set_header Connection "";
            # keepalive 사용 시 Connection 헤더 초기화

            # ── 타임아웃 설정 ─────────────────────
            proxy_connect_timeout 60s;
            # Spring Boot 연결 시도 최대 대기 시간

            proxy_send_timeout    60s;
            # 요청 전송 최대 시간

            proxy_read_timeout    60s;
            # Spring Boot 응답 최대 대기 시간
            # 오래 걸리는 API는 이 값을 늘려야 함
        }

        # 헬스체크 엔드포인트 (로그 기록 제외)
        location /actuator/health {
            proxy_pass http://springboot;
            access_log off;
            # 헬스체크는 30초마다 호출되므로 로그에서 제외
        }

        # actuator 나머지 경로는 외부 차단
        location /actuator/ {
            return 403;
            # 운영 정보 노출 방지
        }
    }
}