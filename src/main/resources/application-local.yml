spring:
  config:
    activate:
      on-profile: local

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    hikari:
      password:

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        hbm2ddl:
          auto: create
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
